<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --sent-msg-bg: #0ea5e9;
            --recv-msg-bg: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
        }

        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .message.sent {
            align-self: flex-end;
            background-color: var(--sent-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background-color: var(--recv-msg-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }

        .sent .message-info {
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        button {
            background-color: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            color: var(--bg-color);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        #typing-indicator {
            padding: 4px 16px;
            background-color: var(--recv-msg-bg);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            margin: 0 0 16px 24px;
            width: fit-content;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #typing-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes blink {
            0% {
                opacity: 0.2;
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
            }
        }

        .typing-dot {
            animation: blink 1.4s infinite both;
            margin-left: 2px;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <div>
                <span class="status-dot"></span>
                <h1>WebSocket Chat</h1>
            </div>
            <span style="font-size: 0.8rem; color: var(--text-secondary);">Room: General</span>
        </header>

        <div class="messages-area" id="messages">
            <div class="message received">
                Welcome to the chat!
                <span class="message-info">System • 12:45 PM</span>
            </div>
            <div class="message received">
                Feel free to send a message.
                <span class="message-info">System • 12:45 PM</span>
            </div>
            <div class="message sent">
                Hello! This looks amazing.
                <span class="message-info">You • 12:46 PM</span>
            </div>
        </div>

        <div id="typing-indicator"></div>

        <form class="input-area" id="message-form">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit">
                <span>Send</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();

        const form = document.getElementById('message-form');
        const input = document.getElementById('message-input');
        const messagesArea = document.getElementById('messages');

        function addMessage(text, type = 'received', sender = 'Someone') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msgDiv.innerHTML = `${text}<span class="message-info">${sender} • ${time}</span>`;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        socket.on("server:message", (data) => {
            console.log("Message from server", data);
            addMessage(data.text, 'received', 'Someone');
        });

        let typingTimeout;
        socket.on("server:user:typing", (data) => {
            const typingIndicator = document.getElementById('typing-indicator');
            typingIndicator.innerHTML = `<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span>`;
            typingIndicator.classList.add('visible');

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                typingIndicator.classList.remove('visible');
            }, 1000);
        });

        function onMessageInput(text) {
            console.log({ message: text });
            socket.emit('user:message', { text }); // (event-name, data)
        }

        // Debounce helper
        function debounce(func, delay = 300) {
            let timer = null;
            return (...args) => {
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => {
                    func(...args)
                }, delay);
            };
        }

        const emitTyping = debounce((text) => {
            socket.emit('user:typing', { text });
        }, 500);

        input.addEventListener('input', (e) => {
            const text = e.target.value;
            if (!text) return;
            emitTyping(text);
        });

        form.onsubmit = (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (text) {
                addMessage(text, 'sent', 'You');
                onMessageInput(text);
                input.value = '';
            }
        };
    </script>
</body>

</html>
